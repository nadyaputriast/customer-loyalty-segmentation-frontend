name: Vercel Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches:
      - main # Change to your deployment branch if it is different
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Install and setup pnpm in the GitHub Action runner
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10 # Use 9 if your project uses pnpm v9

      # 2. Install Vercel CLI
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # 3. Pull settings from Vercel
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # 4. Build the application (Vercel CLI will now find pnpm successfully)
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # 5. Deploy build output to production
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
